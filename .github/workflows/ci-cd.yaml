name: "Ci-CD pipeline"
on: 
    push:
        branches:
            - master
            - main
jobs:
    git-automation:
        runs-on: ubuntu-latest
        steps:
            - name: "Checkout/Build"
              uses: actions/checkout@v4
            - name: "Setup-python"
              uses: actions/setup-python@v5
              with:
               python-version: "3.14"

            - name: "Install-Dependancies"
              run : pip install --no-cache-dir -r requirements.txt 
            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: ${{secrets.DOCKER_USERNAME}}
                password: ${{secrets.DOCKER_PASSWORD}}
            - name : Docker Build
              run: docker build -t k8-automation-image:v1
            - name : Docker push
              run : docker push jaypramodmahajan/k8-project:v1