apiVersion: apps/v1
kind: Deployment
metadata:
    name: nginx-app

spec:
    replacas: 2

    selector:
        matchLabels:
            app: nginx-app
    template:
        metadata:
            labels:
                app: nginx-app

        spec:
            containers:
            - name : nginx-app
              image: nginx:latest

              ports:
              - containerPort: 80  