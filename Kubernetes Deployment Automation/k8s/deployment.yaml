apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8-deployment
  labels:
      created_by: JayMahajan
      app: k8-automation
spec:
  replicas: 3
  selector:
    matchLabels:
        app: k8-automation
  template:
    metadata:
      labels:
        app: k8-automation
    spec:
      containers:
      - name: k8-automation
        image: jaypramodmahajan/k8-automation:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000